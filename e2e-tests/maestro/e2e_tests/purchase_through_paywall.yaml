# This flow requires passing the MAESTRO_STORE environment variable.
#  app_store for iOS, test_store for Android.
# Example:
# maestro test -e MAESTRO_STORE=app_store purchase_through_paywall.yaml

appId: com.revenuecat.automatedsdktests
name: Purchase through paywall

---
- clearState
- pressKey: home
- launchApp
- extendedWaitUntil:
    visible: "Test Cases"
    timeout: 30000
- assertVisible: "Test Cases"
- tapOn:
    text: "Purchase through paywall"
- extendedWaitUntil:
    visible: "Entitlements: none"
    timeout: 15000
- assertVisible: "Entitlements: none"
- assertVisible: "Present Paywall"
- tapOn:
    text: "Present Paywall"
- assertVisible: "Paywall V2"
- takeScreenshot: "purchase_through_paywall - Paywall"
- tapOn:
    text: "Yearly"
- tapOn:
    text: "Continue"
- runFlow:
    file: ../utils/confirm_purchase.yaml
    env:
      SCREENSHOT_PREFIX: purchase_through_paywall
- extendedWaitUntil:
    visible: "Entitlements: pro"
    timeout: 15000
- assertVisible: "Entitlements: pro"
- takeScreenshot: "purchase_through_paywall - completed"
